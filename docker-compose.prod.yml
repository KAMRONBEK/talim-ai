# Production override — use with:
#   doppler run --project talim-ai --config prd -- docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  db:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 128M

  api:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    ports:
      - '80:80'
      - '443:443'
    deploy:
      resources:
        limits:
          memory: 64M
