# Start with Doppler so secrets (JWT_SECRET, API keys) are injected into Compose:
#   pnpm docker:up
# Plain `docker compose up` does NOT read Doppler — only a local .env or the dev fallback below.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: talim
      POSTGRES_PASSWORD: talim
      POSTGRES_DB: talim
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U talim -d talim']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    # Env vars injected by: doppler run -- docker compose up (see scripts/doppler-docker.sh)
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      # Use Docker service hostnames (Doppler dev uses localhost for pnpm dev, not containers)
      DATABASE_URL: postgresql://talim:talim@db:5432/talim
      REDIS_URL: redis://redis:6379
      # Min 32 chars (API zod validation). Override via .env or Doppler (pnpm docker:up).
      JWT_SECRET: ${JWT_SECRET:-talim-ai-local-dev-jwt-secret-change-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # OpenRouter-hosted Mistral OCR (primary scanned-PDF path). Empty default so
      # compose doesn't warn when it's unset (dev / local).
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_OCR_MODEL: ${OPENROUTER_OCR_MODEL:-google/gemini-2.5-flash-lite}
      UPLOAD_DIR: ${UPLOAD_DIR:-/uploads}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
    volumes:
      - uploads_data:/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  uploads_data:
  pgdata:
  redisdata:
  certbot_www:
  certbot_conf:
