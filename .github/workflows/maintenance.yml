name: Weekly product research

# Autonomous "how do we make the product better" loop. Every Monday it runs a deep
# web-research pass tuned to Talim AI + the Uzbek market, writes ONE report under
# docs/research/, and opens a PR for you to triage into docs/PLANS.md / issues.
# It only writes that one markdown file — it never touches code — so the PR is safe
# to skim and the CI gate (ci.yml) still runs on it like any other PR.
#
# Setup (one-time): add an ANTHROPIC_API_KEY repo secret
#   Settings → Secrets and variables → Actions → New repository secret.
# Test without waiting a week: Actions tab → this workflow → "Run workflow".
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC ≈ 11:00 Asia/Tashkent
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    name: Deep research → PR
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Research pass
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are researching how to make **Talim AI** better. It is a multi-tenant
            AI learning platform for the **Uzbek market**: B2C solo learners upload
            PDFs/YouTube/slides and get AI summaries, podcasts, quizzes and an AI tutor;
            B2B tutors/schools buy seats, assign materials, and run assessments incl.
            timed "game" quizzes. Audience is **Uzbek-first, then Russian; English is low
            priority**. Read docs/PLATFORM.md and docs/FEATURES.md first for real context
            on what already exists — do NOT propose things the product already has.

            Do deep, recent web research. Rotate the emphasis week to week across:
            competitor / edtech feature trends, AI-tutoring UX, B2B tutoring & LMS
            monetization and retention, assessment/quiz best practices, and
            Uzbek / Central-Asian localization and go-to-market.

            Write exactly ONE markdown file: docs/research/${{ steps.meta.outputs.date }}.md
            containing:
              - date + the focus area you chose this week
              - 5–10 concrete, prioritized improvement ideas. For each: what it is, why it
                matters for THIS product specifically, rough effort (S/M/L), and a source URL
              - a short "watch list" of things to revisit next time
            Cite every non-obvious claim with a source link. Do NOT modify any code or any
            other file — only create that one report.
          claude_args: |
            --allowedTools WebSearch,WebFetch,Write,Read
            --model claude-opus-4-8
            --max-turns 30

      - name: Open PR with the report
        uses: peter-evans/create-pull-request@v7
        with:
          branch: research/weekly-${{ steps.meta.outputs.date }}
          title: 'Weekly product research — ${{ steps.meta.outputs.date }}'
          commit-message: 'docs(research): weekly product-improvement report ${{ steps.meta.outputs.date }}'
          body: |
            Automated weekly deep-research pass on making Talim AI better.
            Skim the ideas and promote the worthwhile ones into docs/PLANS.md or issues.
            Generated by `.github/workflows/maintenance.yml` — safe to close if a slow week.
          labels: |
            research
            automated
          add-paths: docs/research/**
