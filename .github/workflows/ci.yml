name: CI

# Quality gate for the autonomous loop: nothing broken reaches main.
# Runs on every PR (branch protection can require it) AND is called by deploy.yml
# via workflow_call, so a direct push to main is gated too. build (the expensive
# Docker build) only runs after this passes.
on:
  pull_request:
  workflow_call:

jobs:
  verify:
    name: typecheck · lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # full history: the graphify-freshness step counts commits since the
          # graph's built_at_commit, which a shallow clone can't resolve
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Generate the Prisma client (schema-only, no DB needed) so api typecheck
      # doesn't hit hundreds of phantom errors from a stale/absent client.
      - name: Generate Prisma client
        run: pnpm --filter @talim/api exec prisma generate

      # turbo builds ^build deps (@talim/types, @talim/ui) first, then tsc --noEmit.
      # No Doppler / secrets needed — typecheck & lint don't touch runtime env.
      - name: Typecheck
        run: pnpm typecheck

      # Lint is a HARD gate: the whole monorepo lints clean as of the
      # chore/codebase-cleanup pass (shared flat eslint 9 config in
      # @talim/eslint-config; web/admin use next/core-web-vitals via .eslintrc.json).
      - name: Lint
        run: pnpm lint

      # Warn-only: surface knowledge-graph drift so someone runs
      # scripts/graphify-refresh.sh. Never fails the build.
      - name: Graphify freshness (warn-only)
        if: always()
        run: |
          BUILT=$(node -e "console.log(require('./graphify-out/graph.json').built_at_commit || '')" 2>/dev/null || true)
          if [ -n "$BUILT" ] && git cat-file -e "$BUILT^{commit}" 2>/dev/null; then
            DRIFT=$(git rev-list --count "$BUILT"..HEAD 2>/dev/null || echo "?")
            echo "graphify graph is $DRIFT commits behind HEAD"
            if [ "$DRIFT" != "?" ] && [ "$DRIFT" -gt 30 ]; then
              echo "::warning title=Graphify graph stale::graph.json is $DRIFT commits behind HEAD — run scripts/graphify-refresh.sh"
            fi
          fi
      # NOTE: full app compilation (tsc for api, `next build` for web/admin) is
      # already exercised by the Docker `build` job in deploy.yml, so it is not
      # duplicated here — this gate is the fast type/lint check that precedes it.
