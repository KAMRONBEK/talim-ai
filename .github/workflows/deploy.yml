name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys (don't cancel one mid-restart) so two runs never race the VPS.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Decide which app images actually need rebuilding from the diff. Shared deps fan
  # out: a lockfile / packages/types / compose / workflow change rebuilds everything;
  # packages/ui rebuilds web+admin. An api-only change builds just api.
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set
        run: |
          set -euo pipefail
          ALL='["api","web","admin"]'
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"; exit 0
          fi
          FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          echo "Changed files:"; echo "$FILES"
          # Anything shared rebuilds all three.
          if echo "$FILES" | grep -qE '^(\.github/workflows/|docker-compose|pnpm-lock\.yaml|package\.json|pnpm-workspace\.yaml|packages/types/)'; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"; exit 0
          fi
          apps=()
          echo "$FILES" | grep -qE '^apps/api/'              && apps+=("api")   || true
          echo "$FILES" | grep -qE '^(apps/web/|packages/ui/)'   && apps+=("web")   || true
          echo "$FILES" | grep -qE '^(apps/admin/|packages/ui/)' && apps+=("admin") || true
          if [ ${#apps[@]} -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${apps[@]}" | sort -u | jq -R . | jq -cs . \
              | sed 's/^/matrix=/' >> "$GITHUB_OUTPUT"
          fi

  # Build only the changed images, in parallel, on a 4-vCPU/16GB runner with a
  # persistent layer cache, and push to GHCR. The 2GB VPS never builds anything.
  build:
    name: Build & push ${{ matrix.app }}
    needs: changes
    if: needs.changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/kamronbek/talim-${{ matrix.app }}:latest
            ghcr.io/kamronbek/talim-${{ matrix.app }}:${{ github.sha }}
          # Inlined into the web/admin client bundle at build (public URL, mirrors
          # Doppler prd NEXT_PUBLIC_API_URL). The api Dockerfile ignores it.
          build-args: |
            NEXT_PUBLIC_API_URL=https://talim-ai.uz/api
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # The VPS logs into GHCR, pulls :latest for the app tier, and restarts only the
  # containers whose image changed. No building.
  deploy:
    name: Deploy to VPS
    needs: [changes, build]
    if: needs.changes.outputs.matrix != '[]' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    # 30m (was 15m): the 2GB VPS pulling all three fresh Next.js images at once can
    # exceed 15m and get cancelled mid-restart. Combined with the sequential pull below.
    timeout-minutes: 30
    steps:
      - name: Pull images & restart on the VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 25m
          envs: DOPPLER_TOKEN,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail

            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.registry.yml"
            REPO_DIR="${HOME}/talim-ai"
            REPO_URL="https://github.com/KAMRONBEK/talim-ai.git"

            command -v doppler >/dev/null 2>&1 || \
              curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh \
                | sh -s -- --install-path /usr/local/bin

            [ -d "${REPO_DIR}/.git" ] || git clone "${REPO_URL}" "${REPO_DIR}"
            cd "${REPO_DIR}"
            git fetch origin main
            git reset --hard origin/main

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            export DOPPLER_TOKEN
            DOPPLER_RUN="doppler run --project talim-ai --config prd --"

            # Reclaim ONLY dangling layers before pulling — NOT `-af`. Disk is not the
            # tight resource on this box (RAM is); an aggressive `-af` evicts the shared
            # ~193MB node:alpine base the moment the old app images are superseded, forcing
            # EVERY deploy to re-download + decompress it (~193MB → real RAM pressure on the
            # 1.9GB box). Dangling-only keeps that base cached, so a routine deploy pulls
            # just the changed app layers. Superseded images are reclaimed by the
            # post-deploy `prune -af` below (only after the new stack is healthy). The OLD
            # stack is still running here, so its in-use layers are protected regardless.
            # `|| true` so a cleanup hiccup never aborts the deploy.
            echo "disk before cleanup:"; df -h / | tail -1
            docker container prune -f || true
            docker image prune -f || true
            echo "disk after cleanup:"; df -h / | tail -1

            # Pull :latest for the app tier ONLY (api/web/admin from GHCR). db/redis/nginx
            # are pinned public images already on the host — pulling them from Docker Hub
            # every deploy intermittently fails on TLS timeouts and aborts the whole deploy.
            # Pull SEQUENTIALLY (one image at a time): the 2GB VPS decompressing three large
            # Next.js images in parallel pushes it into swap and a deploy can blow past the
            # job timeout. Each image gets its own retry so a single transient GHCR
            # TLS-handshake timeout doesn't abort an otherwise-healthy deploy.
            for img in api web admin; do
              pulled=0
              for attempt in 1 2 3; do
                if ${DOPPLER_RUN} docker compose ${COMPOSE_FILES} pull "${img}"; then pulled=1; break; fi
                echo "pull ${img} attempt ${attempt} failed (transient registry error); retrying in 10s..."
                sleep 10
              done
              [ "${pulled}" = 1 ] || { echo "image pull for ${img} failed after 3 attempts"; exit 1; }
            done
            # up recreates only containers whose image digest changed.
            ${DOPPLER_RUN} docker compose ${COMPOSE_FILES} up -d --no-build --wait db redis api web admin
            ${DOPPLER_RUN} docker compose ${COMPOSE_FILES} up -d --no-build --force-recreate --no-deps --wait nginx

            docker logout ghcr.io || true
            # Free the images the new stack just superseded (now unused; running
            # containers protect their own images). -af, not dangling-only, and never
            # fail the deploy on a prune hiccup.
            docker image prune -af || true
