name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Deploy via SSH with Doppler
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 40m
          envs: DOPPLER_TOKEN
          script: |
            set -euo pipefail

            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml"
            REPO_DIR="${HOME}/talim-ai"
            REPO_URL="https://github.com/KAMRONBEK/talim-ai.git"

            if ! command -v docker >/dev/null 2>&1; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y ca-certificates curl git
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              chmod a+r /etc/apt/keyrings/docker.asc
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "${VERSION_CODENAME}") stable" > /etc/apt/sources.list.d/docker.list
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
            fi

            if ! command -v doppler >/dev/null 2>&1; then
              curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sh -s -- --install-path /usr/local/bin
            fi

            if [ ! -d "${REPO_DIR}/.git" ]; then
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi

            cd "${REPO_DIR}"
            git fetch origin main
            git reset --hard origin/main

            systemctl stop caddy 2>/dev/null || true
            systemctl disable caddy 2>/dev/null || true
            # Do not use pkill -f '/opt/jarviddin' — it matches this script's argv and kills the SSH session
            fuser -k 3000/tcp 2>/dev/null || true

            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            # Prune BuildKit cache once per week; keep ~5GB to avoid filling the 40GB disk
            PRUNE_STAMP="${HOME}/.talim-docker-builder-prune-at"
            PRUNE_AGE_SEC=$((7 * 24 * 60 * 60))
            LAST_PRUNE=$([ -f "${PRUNE_STAMP}" ] && stat -c %Y "${PRUNE_STAMP}" || echo 0)
            NOW=$(date +%s)
            if [ $((NOW - LAST_PRUNE)) -ge "${PRUNE_AGE_SEC}" ]; then
              docker builder prune -f --max-used-space 5gb
              touch "${PRUNE_STAMP}"
            fi

            export DOPPLER_TOKEN="${DOPPLER_TOKEN}"
            doppler run --project talim-ai --config prd -- docker compose ${COMPOSE_FILES} up -d --build
            doppler run --project talim-ai --config prd -- docker compose ${COMPOSE_FILES} exec -T api npx prisma migrate deploy || true
            docker image prune -f
