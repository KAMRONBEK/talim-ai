events {
  worker_connections 1024;
}

http {
  # Default is 1m — uploads (PDF) go through /api/ and need to match multer (50MB).
  client_max_body_size 50m;
  # Docker embedded DNS — re-resolve service names when containers are recreated.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Local Docker: http://localhost (port 80) with /api → api service
  server {
    listen 80;
    server_name admin.localhost;

    location /api/ {
      set $api_upstream api:4000;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
      chunked_transfer_encoding on;
    }

    location / {
      set $admin_upstream admin:3001;
      proxy_pass http://$admin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  server {
    listen 80;
    server_name localhost 127.0.0.1;

    location /api/ {
      set $api_upstream api:4000;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
      chunked_transfer_encoding on;
    }

    location / {
      set $web_upstream web:3000;
      proxy_pass http://$web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Secondary domain → canonical primary
  server {
    listen 80;
    server_name talimai.uz www.talimai.uz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://talim-ai.uz$request_uri;
    }
  }

  server {
    listen 80;
    server_name talim-ai.uz www.talim-ai.uz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name talim-ai.uz www.talim-ai.uz;

    ssl_certificate /etc/letsencrypt/live/talim-ai.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/talim-ai.uz/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
      set $api_upstream api:4000;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
      chunked_transfer_encoding on;
    }

    location / {
      set $web_upstream web:3000;
      proxy_pass http://$web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  server {
    listen 80;
    server_name admin.talim-ai.uz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name admin.talim-ai.uz;

    ssl_certificate /etc/letsencrypt/live/talim-ai.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/talim-ai.uz/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
      set $api_upstream api:4000;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
      chunked_transfer_encoding on;
    }

    location / {
      set $admin_upstream admin:3001;
      proxy_pass http://$admin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
